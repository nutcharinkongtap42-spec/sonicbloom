<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จองโต๊ะ - SONIC BLOOM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap');
  body { font-family: 'Kanit', sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; }
  .container { max-width: 500px; margin: auto; text-align: center; }
  .floor-plan { position: relative; width: 100%; aspect-ratio: 750 / 1000; background: url('S__119201806.jpg') no-repeat center center; background-size: contain; margin: 15px 0; border: 2px solid #333; border-radius: 10px; }
  .table-btn { position: absolute; width: 8.5%; aspect-ratio: 1/1; border-radius: 50%; border: 2px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.3); transition: 0.3s; }
  .table-btn.selected { background: #3498db !important; box-shadow: 0 0 15px #3498db; }
  .table-btn.booked { background: #555 !important; border-color: #888 !important; cursor: not-allowed; opacity: 0.8; pointer-events: none; }
  /* ตำแหน่งโต๊ะ */
  .t1 { top: 14%; left: 8.5%; } .t2 { top: 25%; left: 8.5%; }
  .t3 { top: 40.5%; left: 9.5%; } .t4 { top: 40.5%; left: 24.5%; } .t5 { top: 40.5%; left: 39.5%; } .t6 { top: 40.5%; left: 54.5%; }
  .t7 { top: 50%; left: 9.5%; } .t8 { top: 50%; left: 24.5%; } .t9 { top: 50%; left: 39.5%; } .t10 { top: 50%; left: 54.5%; }
  .t11 { top: 59.5%; left: 9.5%; } .t12 { top: 59.5%; left: 24.5%; } .t13 { top: 59.5%; left: 39.5%; } .t14 { top: 59.5%; left: 54.5%; }
  .t15 { top: 70%; left: 16%; } .t16 { top: 70%; left: 30.5%; } .t17 { top: 70%; left: 45%; } .t18 { top: 70%; left: 59%; }
  .t19 { top: 62.5%; left: 70.5%; } .t20 { top: 62.5%; left: 84.5%; }
  .ts1 { top: 38%; left: 70.5%; } .ts2 { top: 51.5%; left: 70.5%; }
  .ts3 { top: 80.5%; left: 17%; } .ts4 { top: 80.5%; left: 32%; }
  .input-box { width: 90%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; }
  .btn-confirm { background: #e74c3c; color: #fff; padding: 15px; border: none; width: 100%; border-radius: 30px; font-size: 18px; cursor: pointer; margin-top: 15px; font-weight: bold; }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; }
  .modal-content { color: #000; width: 100%; max-width: 500px; margin: auto; padding: 30px 20px; box-sizing: border-box; text-align: center; }
  .summary-info { text-align: left; background: #fdfdfd; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
  .qr-code { width: 250px; margin: 10px auto; display: block; border: 1px solid #eee; padding: 10px; border-radius: 10px; }
  .upload-zone { background: #f0f7ff; padding: 20px; border-radius: 15px; border: 2px dashed #3498db; margin-top: 20px; }
  .btn-finish { background: #27ae60; color: #fff; padding: 15px; border: none; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
  #loadingOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; justify-content:center; align-items:center; flex-direction:column; }
</style>
</head>
<body>

<div id="loadingOverlay"><div>กำลังบันทึกข้อมูล...</div></div>

<div class="container">
  <h2>SONIC BLOOM - จองโต๊ะ</h2>
  <input type="text" id="custName" class="input-box" placeholder="ชื่อลูกค้า">
  <input type="tel" id="custPhone" class="input-box" placeholder="เบอร์โทรศัพท์">
  <div class="floor-plan" id="plan">
    </div>
  <h3 id="totalLabel">ยอดรวม: 0 บาท</h3>
  <button class="btn-confirm" onclick="openPayment()">แจ้งชำระเงิน</button>
</div>

<div id="paymentModal" class="modal">
  <div class="modal-content">
    <h2 style="color: #e74c3c;">ยืนยันการโอนเงิน</h2>
    <div class="summary-info">
      <div id="resName"></div><div id="resPhone"></div><div id="resTables"></div>
      <div id="resTotal" style="font-size: 22px; font-weight: bold; color: #d63031; margin-top:10px;"></div>
    </div>
    <img src="S__12263429.jpg" class="qr-code">
    <div class="upload-zone">
      <label>📸 แนบสลิปโอนเงิน</label><br><br>
      <input type="file" id="slipFile" accept="image/*">
    </div>
    <button class="btn-finish" onclick="finishBooking()">ยืนยันแจ้งโอนเงิน</button>
    <button onclick="closeModal()" style="background:none; border:none; color:#888; margin-top:20px; cursor:pointer; text-decoration:underline;">ย้อนกลับ</button>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYsysxxJp8zSJL1FZ8063j7w2dVVQ2F3_E97gLUxROywqIsg2YND3SeIqUK6sGN2Yf/exec";
let total = 0;
let selected = [];
const prices = { '1':1200, '2':1200, 'S1':1200, 'S2':1200, '3':1200, '4':1200, '5':1200, '6':1200, '7':999, '8':999, '9':999, '10':999, '11':999, '12':999, '13':999, '14':999, '15':799, '16':799, '17':799, '18':799, '19':799, '20':799, 'S3':799, 'S4':799 };

// สร้างปุ่มโต๊ะ
const tableKeys = Object.keys(prices);
tableKeys.forEach(id => {
    const btn = document.createElement('div');
    btn.className = `table-btn t${id.toLowerCase()}`;
    btn.innerText = id;
    btn.onclick = () => toggleTable(btn, id);
    document.getElementById('plan').appendChild(btn);
});

// ดึงข้อมูลโต๊ะที่จองแล้วจาก Google Sheets
window.onload = () => {
    fetch(SCRIPT_URL).then(res => res.json()).then(booked => {
        document.querySelectorAll('.table-btn').forEach(btn => {
            if(booked.includes(btn.innerText)) btn.classList.add('booked');
        });
    });
};

function toggleTable(btn, id) {
    if(btn.classList.contains('booked')) return;
    if(btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        selected = selected.filter(t => t !== id);
        total -= prices[id];
    } else {
        btn.classList.add('selected');
        selected.push(id);
        total += prices[id];
    }
    document.getElementById('totalLabel').innerText = `ยอดรวม: ${total.toLocaleString()} บาท`;
}

function openPayment() {
    if(!document.getElementById("custName").value || selected.length === 0) return alert("กรุณากรอกชื่อและเลือกโต๊ะ");
    document.getElementById("resName").innerText = "ชื่อ: " + document.getElementById("custName").value;
    document.getElementById("resPhone").innerText = "เบอร์: " + document.getElementById("custPhone").value;
    document.getElementById("resTables").innerText = "โต๊ะ: " + selected.join(", ");
    document.getElementById("resTotal").innerText = "ยอดโอน: " + total.toLocaleString() + " บาท";
    document.getElementById("paymentModal").style.display = "block";
}

function finishBooking() {
    if(!document.getElementById("slipFile").files[0]) return alert("กรุณาแนบรูปสลิป");
    document.getElementById("loadingOverlay").style.display = "flex";
    
    const data = {
        name: document.getElementById("custName").value,
        phone: document.getElementById("custPhone").value,
        tables: selected
    };

    fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(data)
    }).then(() => {
        alert("จองสำเร็จ! กรุณาแคปหน้าจอแจ้งทางไลน์ร้านอีกครั้ง");
        location.reload();
    }).catch(err => {
        alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
        document.getElementById("loadingOverlay").style.display = "none";
    });
}

function closeModal() { document.getElementById("paymentModal").style.display = "none"; }
</script>
</body>
</html>
