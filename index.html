<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จองโต๊ะ - STAGE FRONT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap');
  
  body { font-family: 'Kanit', sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; }
  .container { max-width: 500px; margin: auto; text-align: center; }

  /* ผังร้าน */
  .floor-plan {
    position: relative;
    width: 100%;
    aspect-ratio: 750 / 1000;
    background: url('S__119201806.jpg') no-repeat center center;
    background-size: contain;
    margin: 15px 0;
    border: 2px solid #333;
    border-radius: 10px;
  }

  /* ปุ่มโต๊ะ */
  .table-btn {
    position: absolute; width: 8.5%; aspect-ratio: 1/1;
    border-radius: 50%; border: 2px solid #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: bold; color: #fff;
    background: rgba(0,0,0,0.3); transition: 0.3s;
  }
  .table-btn.selected { background: #3498db !important; box-shadow: 0 0 15px #3498db; }
  .table-btn.booked { background: #555 !important; border-color: #888 !important; cursor: not-allowed; opacity: 0.8; }

  /* ตำแหน่งโต๊ะ (อ้างอิงตามรูปเดิม) */
  .t1 { top: 14%; left: 8.5%; } .t2 { top: 25%; left: 8.5%; }
  .t3 { top: 40.5%; left: 9.5%; } .t4 { top: 40.5%; left: 24.5%; } .t5 { top: 40.5%; left: 39.5%; } .t6 { top: 40.5%; left: 54.5%; }
  .t7 { top: 50%; left: 9.5%; } .t8 { top: 50%; left: 24.5%; } .t9 { top: 50%; left: 39.5%; } .t10 { top: 50%; left: 54.5%; }
  .t11 { top: 59.5%; left: 9.5%; } .t12 { top: 59.5%; left: 24.5%; } .t13 { top: 59.5%; left: 39.5%; } .t14 { top: 59.5%; left: 54.5%; }
  .t15 { top: 70%; left: 16%; } .t16 { top: 70%; left: 30.5%; } .t17 { top: 70%; left: 45%; } .t18 { top: 70%; left: 59%; }
  .t19 { top: 62.5%; left: 70.5%; } .t20 { top: 62.5%; left: 84.5%; }
  .ts1 { top: 38%; left: 70.5%; } .ts2 { top: 51.5%; left: 70.5%; }
  .ts3 { top: 80.5%; left: 17%; } .ts4 { top: 80.5%; left: 32%; }

  .input-box { width: 90%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; }
  .btn-confirm { background: #e74c3c; color: #fff; padding: 15px; border: none; width: 100%; border-radius: 30px; font-size: 18px; cursor: pointer; margin-top: 15px; font-weight: bold; }

  /* Modal แก้ไขพื้นหลังขาวเต็ม */
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; }
  .modal-content { color: #000; width: 100%; max-width: 500px; margin: auto; padding: 30px 20px; box-sizing: border-box; text-align: center; }
  
  .receipt-header { border-bottom: 2px dashed #eee; padding-bottom: 15px; margin-bottom: 20px; }
  .summary-info { text-align: left; background: #fdfdfd; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 16px; border: 1px solid #eee; }
  .qr-code { width: 250px; margin: 10px auto; display: block; border: 1px solid #eee; padding: 10px; border-radius: 10px; }
  
  .upload-zone { background: #f0f7ff; padding: 20px; border-radius: 15px; border: 2px dashed #3498db; margin-top: 20px; }
  .btn-finish { background: #27ae60; color: #fff; padding: 15px; border: none; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
  .btn-back { background: none; border: none; color: #888; margin-top: 20px; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
  <h2>เลือกโต๊ะจอง</h2>
  <input type="text" id="custName" class="input-box" placeholder="ชื่อลูกค้า">
  <input type="tel" id="custPhone" class="input-box" placeholder="เบอร์โทรศัพท์">

  <div class="floor-plan">
    <div class="table-btn t1">1</div><div class="table-btn t2">2</div>
    <div class="table-btn t3">3</div><div class="table-btn t4">4</div><div class="table-btn t5">5</div><div class="table-btn t6">6</div>
    <div class="table-btn t7">7</div><div class="table-btn t8">8</div><div class="table-btn t9">9</div><div class="table-btn t10">10</div>
    <div class="table-btn t11">11</div><div class="table-btn t12">12</div><div class="table-btn t13">13</div><div class="table-btn t14">14</div>
    <div class="table-btn t15">15</div><div class="table-btn t16">16</div><div class="table-btn t17">17</div><div class="table-btn t18">18</div>
    <div class="table-btn t19">19</div><div class="table-btn t20">20</div>
    <div class="table-btn ts1">S1</div><div class="table-btn ts2">S2</div><div class="table-btn ts3">S3</div><div class="table-btn ts4">S4</div>
  </div>

  <h3 id="totalLabel">ยอดรวม: 0 บาท</h3>
  <button class="btn-confirm" onclick="openPayment()">แจ้งชำระเงิน</button>
</div>

<!-- หน้าชำระเงิน (Full White Background) -->
<div id="paymentModal" class="modal">
  <div class="modal-content">
    <div class="receipt-header">
      <h2 style="margin:0; color: #e74c3c;">ยืนยันการจอง</h2>
      <p style="color:#888; font-size: 14px;">กรุณาแคปหน้าจอนี้พร้อมแนบสลิปส่งทาง LINE</p>
    </div>

    <div class="summary-info">
      <div id="resName"></div>
      <div id="resPhone"></div>
      <div id="resTables" style="font-weight: bold; color: #3498db;"></div>
      <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
      <div id="resTotal" style="font-size: 22px; font-weight: bold; color: #d63031; text-align: center;"></div>
    </div>

    <p style="font-weight: bold; margin-bottom: 5px;">สแกนเพื่อโอนเงิน</p>
    <img src="S__12263429.jpg" class="qr-code">
    <p style="font-size: 14px; color: #666;">ชื่อบัญชี: พนิดา โพธิ์งาม</p>

    <div class="upload-zone">
      <label style="font-weight: bold; display: block; margin-bottom: 10px;">📸 แนบหลักฐานการโอนเงิน</label>
      <input type="file" id="slipFile" accept="image/*">
    </div>

    <button class="btn-finish" onclick="finishBooking()">ยืนยันแจ้งโอนเงิน</button>
    <button class="btn-back" onclick="closeModal()">ย้อนกลับไปแก้ไข</button>
  </div>
</div>

<script>
let total = 0;
let selected = [];
const prices = { '1':1200, '2':1200, 'S1':1200, 'S2':1200, '3':1200, '4':1200, '5':1200, '6':1200, '7':999, '8':999, '9':999, '10':999, '11':999, '12':999, '13':999, '14':999, '15':799, '16':799, '17':799, '18':799, '19':799, '20':799, 'S3':799, 'S4':799 };

document.querySelectorAll(".table-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    if(this.classList.contains('booked')) return;
    const name = this.innerText;
    const price = prices[name] || 0;

    if(this.classList.contains("selected")) {
      this.classList.remove("selected");
      total -= price;
      selected = selected.filter(t => t !== name);
    } else {
      this.classList.add("selected");
      total += price;
      selected.push(name);
    }
    document.getElementById("totalLabel").innerText = `ยอดรวม: ${total.toLocaleString()} บาท`;
  });
});

function openPayment() {
  const name = document.getElementById("custName").value;
  const phone = document.getElementById("custPhone").value;
  if(!name || !phone || selected.length === 0) return alert("กรุณากรอกข้อมูลและเลือกโต๊ะ");

  document.getElementById("resName").innerHTML = `<b>ชื่อผู้จอง:</b> ${name}`;
  document.getElementById("resPhone").innerHTML = `<b>เบอร์ติดต่อ:</b> ${phone}`;
  document.getElementById("resTables").innerHTML = `<b>โต๊ะที่จอง:</b> ${selected.join(", ")}`;
  document.getElementById("resTotal").innerText = `ยอดเงินรวม: ${total.toLocaleString()} บาท`;
  
  document.getElementById("paymentModal").style.display = "block";
  window.scrollTo(0,0);
}

function finishBooking() {
  if(!document.getElementById("slipFile").files[0]) return alert("กรุณาแนบรูปสลิปเพื่อยืนยัน");

  alert("จองสำเร็จ! โต๊ะของคุณถูกล็อคแล้ว กรุณาแคปจอส่งไลน์แจ้งร้านครับ");
  
  document.querySelectorAll(".table-btn.selected").forEach(btn => {
    btn.classList.remove("selected");
    btn.classList.add("booked");
  });

  selected = [];
  total = 0;
  document.getElementById("totalLabel").innerText = `ยอดรวม: 0 บาท`;
  closeModal();
}

function closeModal() {
  document.getElementById("paymentModal").style.display = "none";
}
</script>

</body>
</html>
